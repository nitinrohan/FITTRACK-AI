# Alembic configuration file.
# The DATABASE_URL is read from the environment in alembic/env.py,
# so the sqlalchemy.url setting here is only a fallback.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Only used when running alembic outside of the application context.
# In normal usage DATABASE_URL env var overrides this.
sqlalchemy.url = postgresql://fittrack:changeme@localhost:5432/fittrack

# Migration file naming: timestamp + description.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[post_write_hooks]
# Run ruff on generated migration files.
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
